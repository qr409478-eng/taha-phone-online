<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طه فون | Taha Phone - المنصة الذكية لصيانة الهواتف</title>
    <script src="https://cdn.tailwindcss.com\"></script>
    <style>
        .neon-border { box-shadow: 0 0 15px rgba(20, 184, 166, 0.5); }
        .neon-text { text-shadow: 0 0 10px rgba(20, 184, 166, 0.6); }
        .neon-card-blue { box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .neon-card-green { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen selection:bg-teal-500 selection:text-slate-950">

    <div class="max-w-4xl mx-auto p-4">
        
        <header class="text-center my-8">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-400 neon-text tracking-wide mb-2">طـه فـون</h1>
            <p class="text-xs text-slate-400 tracking-widest uppercase">المنصة الذكية لإدارة صيانة الهواتف والحسابات</p>
        </header>

        <div id="loginSection" class="bg-slate-900/60 border border-slate-800 p-6 rounded-2xl max-w-sm mx-auto text-center neon-border backdrop-blur-md">
            <h2 class="text-xl font-bold mb-4 text-teal-400">تسجيل الدخول للمنصة</h2>
            <input type="password" id="passwordInput" placeholder="أدخل كلمة مرور الفني..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-center text-teal-300 focus:outline-none focus:border-teal-500 font-mono tracking-widest mb-4">
            <button onclick="checkLogin()" class="w-full bg-gradient-to-r from-teal-500 to-emerald-500 text-slate-950 font-bold py-3 rounded-xl hover:from-teal-400 hover:to-emerald-400 transition-all shadow-lg shadow-teal-500/20">دخول لوحة التحكم</button>
            <p id="loginError" class="text-red-400 text-sm mt-3 hidden">⚠️ كلمة المرور غير صحيحة!</p>
        </div>

        <div id="shopSection" class="hidden space-y-6">
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-slate-900/40 border border-slate-800/80 p-4 rounded-2xl text-center backdrop-blur-sm">
                    <p class="text-xs text-slate-400 mb-1">أرباح السوفتوير (الأسبوع)</p>
                    <p id="statSoftware" class="text-2xl font-black text-teal-400">0</p>
                </div>
                <div class="bg-slate-900/40 border border-slate-800/80 p-4 rounded-2xl text-center backdrop-blur-sm">
                    <p class="text-xs text-slate-400 mb-1">صافي حصتي (50%)</p>
                    <p id="statMyShare" class="text-2xl font-black text-emerald-400">0</p>
                </div>
                <div class="bg-slate-900/40 border border-slate-800/80 p-4 rounded-2xl text-center backdrop-blur-sm neon-card-blue">
                    <p class="text-xs text-slate-400 mb-1">المتبقي لي الحين</p>
                    <p id="statRemaining" class="text-2xl font-black text-blue-400">0</p>
                </div>
                <div class="bg-slate-900/40 border border-slate-800/80 p-4 rounded-2xl text-center backdrop-blur-sm">
                    <p class="text-xs text-slate-400 mb-1">إجمالي الهاردوير</p>
                    <p id="statHardware" class="text-2xl font-black text-amber-400">0</p>
                </div>
            </div>

            <div class="bg-slate-900/40 border border-slate-800/60 p-4 rounded-2xl flex flex-wrap items-center justify-between gap-4 backdrop-blur-sm">
                <div class="text-right">
                    <p class="text-xs text-slate-400">إجمالي مسحوباتك المادية السابقة</p>
                    <p class="text-sm font-bold text-slate-200">المسحوب فعلياً: <span id="statWithdrawn" class="text-red-400 font-mono">0</span> شيكل</p>
                </div>
                <div class="flex gap-2 w-full sm:w-auto">
                    <input type="number" id="withdrawAmount" placeholder="المبلغ..." class="bg-slate-950 border border-slate-800 px-3 py-2 rounded-xl text-center text-red-400 font-mono w-28 focus:outline-none focus:border-red-500">
                    <button onclick="submitWithdraw()" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/30 font-bold px-4 py-2 rounded-xl transition-all">تسجيل سحب مال</button>
                </div>
            </div>

            <div class="bg-slate-900/60 border border-slate-800 p-5 rounded-2xl backdrop-blur-md">
                <h3 class="text-lg font-bold mb-4 text-teal-400 flex items-center gap-2">✨ إضافة جهاز صيانة جديد</h3>
                <form id="deviceForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="customerName" placeholder="اسم الزبون..." required class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:border-teal-500 text-sm">
                    <input type="text" id="phoneModel" placeholder="موديل الجهاز (مثال: Poco X3)..." required class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:border-teal-500 text-sm">
                    <select id="issueType" class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:border-teal-500 text-sm text-slate-300">
                        <option value="سوفتوير">سوفتوير (تخضع للحسبة 50%)</option>
                        <option value="هاردوير">هاردوير (خارج الحسبة الأسبوعية)</option>
                        <option value="شاشة">شاشة / قطع غيار</option>
                        <option value="شاحن">شاحن / إكسسوار</option>
                    </select>
                    <input type="number" id="cost" placeholder="التكلفة الإجمالية للزبون..." required class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:border-teal-500 text-sm font-mono">
                    <input type="number" id="extraCost" placeholder="تكلفة قطع الغيار الخارجية (إن وجدت)..." class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:border-teal-500 text-sm font-mono">
                    <input type="text" id="notes" placeholder="ملاحظات العطل والعملية..." class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:border-teal-500 text-sm md:col-span-1">
                    <button type="submit" class="md:col-span-3 bg-teal-500 hover:bg-teal-400 text-slate-950 font-bold py-2.5 rounded-xl transition-all shadow-md">حفظ وثبيت الجهاز في السحاب أونلاين</button>
                </form>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between flex-wrap gap-2">
                    <h3 class="text-xl font-bold text-slate-200">سجل الأجهزة والعمليات</h3>
                    <input type="text" id="searchBox" oninput="searchDevices()" placeholder="بحث باسم الزبون أو الموديل..." class="bg-slate-900 border border-slate-800 px-4 py-2 rounded-xl text-sm focus:outline-none focus:border-teal-500 w-full sm:w-64">
                </div>

                <div id="devicesContainer" class="space-y-3">
                    </div>
            </div>

        </div>
    </div>

    <script>
        let allDevices = [];
        const isLoggedIn = localStorage.getItem('taha_auth') === 'true';

        function checkLogin() {
            const pass = document.getElementById('passwordInput').value;
            if (pass === '720') { // كلمة مرور مخصصة للفني
                localStorage.setItem('taha_auth', 'true');
                switchView('shop');
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function switchView(view) {
            if (view === 'shop') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('shopSection').classList.remove('hidden');
                loadDevices();
            }
        }

        async function loadDevices() {
            try {
                const res = await fetch('/api/devices');
                const data = await res.json();
                allDevices = data.devices || [];
                renderStats(data.stats);
                renderShopDevices(allDevices);
            } catch (err) {
                console.error("Error loading devices:", err);
            }
        }

        function renderStats(stats) {
            if(!stats) return;
            document.getElementById('statSoftware').innerText = (stats.totalSoftwareWeek || 0) + ' ₪';
            document.getElementById('statMyShare').innerText = (stats.myShareWeek || 0) + ' ₪';
            document.getElementById('statRemaining').innerText = (stats.myRemaining || 0) + ' ₪';
            document.getElementById('statHardware').innerText = (stats.totalHardware || 0) + ' ₪';
            document.getElementById('statWithdrawn').innerText = stats.technicianWithdrawn || 0;
        }

        function renderShopDevices(devices) {
            const container = document.getElementById('devicesContainer');
            container.innerHTML = '';

            if (devices.length === 0) {
                container.innerHTML = `<div class="text-center p-8 bg-slate-900/20 border border-slate-800 rounded-2xl text-slate-500 text-sm">لا توجد أجهزة مسجلة حالياً</div>`;
                return;
            }

            devices.forEach(dev => {
                const net = dev.cost - dev.extra_cost;
                const card = document.createElement('div');
                card.className = `bg-slate-900/50 border ${dev.is_paid ? 'border-slate-800/80' : 'border-teal-500/30 neon-card-green'} p-4 rounded-2xl space-y-3 transition-all`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start flex-wrap gap-2">
                        <div>
                            <span class="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded font-mono">${dev.date_string || ''}</span>
                            <h4 class="text-base font-bold mt-1 text-slate-100">${dev.customer_name} <span class="text-teal-400 font-medium text-sm">(${dev.phone_model})</span></h4>
                            <p class="text-xs text-slate-400 mt-0.5">العطل: ${dev.issue_type} | <span class="text-slate-300">${dev.notes || 'لا ملاحظات'}</span></p>
                        </div>
                        <div class="text-left">
                            <p class="text-sm font-black text-teal-400 font-mono">${dev.cost} ₪</p>
                            ${dev.extra_cost > 0 ? `<p class="text-[10px] text-red-400 font-mono">القطع: -${dev.extra_cost} ₪</p>` : ''}
                            <span class="inline-block text-[10px] mt-1 px-2 py-0.5 rounded-full font-bold ${dev.is_paid ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-amber-500/10 text-amber-400 border border-amber-500/20'}">
                                ${dev.is_paid ? '🟢 تم الدفع والحساب' : '🟡 قيد الانتظار / لم يحسب'}
                            </span>
                        </div>
                    </div>
                    <div class="flex justify-end gap-2 border-t border-slate-800/60 pt-3">
                        ${!dev.is_paid ? `<button onclick="updateDevice('${dev.id}', {is_paid: true})" class="text-xs bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold px-3 py-1.5 rounded-xl transition-all">💰 تم قبض الحساب</button>` : ''}
                        <button onclick="deleteDevice('${dev.id}')" class="text-xs bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 px-3 py-1.5 rounded-xl transition-all">حذف</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('deviceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch('/api/devices', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    customer_name: document.getElementById('customerName').value,
                    phone_model: document.getElementById('phoneModel').value,
                    issue_type: document.getElementById('issueType').value,
                    cost: document.getElementById('cost').value,
                    extra_cost: document.getElementById('extraCost').value || 0,
                    notes: document.getElementById('notes').value
                })
            });
            document.getElementById('deviceForm').reset();
            loadDevices();
        });

        async function updateDevice(id, fields) {
            await fetch(`/api/devices/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(fields)
            });
            loadDevices();
        }

        async function deleteDevice(id) {
            if(confirm("هل تريد حذف هذا الجهاز نهائياً من السحاب؟")) {
                await fetch(`/api/devices/${id}`, { method: 'DELETE' });
                loadDevices();
            }
        }

        async function submitWithdraw() {
            const amt = document.getElementById('withdrawAmount').value;
            if(!amt || amt <= 0) return;
            await fetch('/api/withdraw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: amt })
            });
            document.getElementById('withdrawAmount').value = '';
            loadDevices();
        }

        function searchDevices() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            const f = allDevices.filter(d => d.customer_name.toLowerCase().includes(q) || d.phone_model.toLowerCase().includes(q) || (d.notes && d.notes.toLowerCase().includes(q)));
            renderShopDevices(f);
        }

        document.getElementById('passwordInput').addEventListener('keyup', (e) => {
            if(e.key === 'Enter') checkLogin();
        });

        if (isLoggedIn) {
            switchView('shop');
        }
    </script>
</body>
</html>
